                  />

                  <input
                    type="number"
                    placeholder="支出"
                    value={totalExpense}
                    onChange={(e) => setTotalExpense(e.target.value)}
                    className="w-full px-4 py-3 rounded-2xl border border-slate-200 focus:border-pink-500 focus:ring-2 focus:ring-pink-500/20 transition-all"
                  />
                </div>
              </div>
            </section>

            <section className="bg-white rounded-3xl p-6 border border-pink-200 shadow-sm">
              <div className="text-center space-y-4">
                <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-br from-pink-500 to-pink-600 shadow-lg">
                  <span className="text-2xl">💰</span>

                <div className="space-y-2">

                    {totals.aPct}% : {totals.bPct}%

                  <p className="text-sm text-slate-600">Aの負担率 : Bの負担率</p>

    console.log('Current page title:', document.title);
    console.log('=== End Mount Debug ===');

    // Reactエラーバウンダリーを追加
    const ErrorBoundary = class extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }

      componentDidCatch(error, errorInfo) {
        console.error('=== React Error Boundary ===');
        console.error('Error:', error);
        console.error('Error Info:', errorInfo);
        console.error('=== End React Error ===');
      }

      render() {
        if (this.state.hasError) {
          return React.createElement('div', {
            style: { padding: '20px', textAlign: 'center', color: 'red' }
          }, [
            React.createElement('h1', null, 'React Component Error'),
            React.createElement('pre', null, this.state.error.toString()),
            React.createElement('p', null, 'Please check console for details')
          ]);
        }
        return this.props.children;
      }
    };

    try {
      root.render(React.createElement(ErrorBoundary, null, React.createElement(App)));
    } catch (error) {
      console.error('=== React Render Error ===');
      console.error('Error:', error);
      console.error('=== End Render Error ===');

      // エラー時にシンプルなコンテンツを表示
      document.getElementById('root').innerHTML = `
        <div style="padding: 20px; text-align: center;">
          <h1>React Error</h1>
          <p>${error.toString()}</p>
          <p>Please check console for details</p>
        </div>
      `;
    }

    // レンダリング完了後の状態を記録
    setTimeout(() => {

  <script>
      // ServiceWorkerの登録を無効化（デバッグ用）
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (registrations) {
          for (let registration of registrations) {
            console.log('Unregistering SW:', registration.scope);
            registration.unregister();
          }
        });
      }

      (function () {
        var dismissed = sessionStorage.getItem('pwaToastDismissed') === '1';
        var deferredPrompt = null;
        // var toast = document.getElementById('pwa-toast'); // 一時的に無効化
        var toast = null;
        var actionBtn = document.getElementById('pwa-toast-action');
        var closeBtn = document.getElementById('pwa-toast-close');
        var isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        var isMobile = /iPhone|Android/.test(navigator.userAgent) && window.innerWidth < 768;
        function showToast() { if (!isStandalone && isMobile && !dismissed) toast.classList.remove('hidden'); }
        window.addEventListener('beforeinstallprompt', function (e) { e.preventDefault(); deferredPrompt = e; setTimeout(showToast, 5000); });
        var ua = navigator.userAgent;
        var isIOS = /iPhone|iPad|iPod/.test(ua);
        var isSafari = /^((?!chrome|android).)*safari/i.test(ua);
        if (!isStandalone && isMobile && isIOS && isSafari) {
          setTimeout(showToast, 5000);
          actionBtn.textContent = '手順を見る';
          actionBtn.onclick = function () { alert('共有ボタンから「ホーム画面に追加」を選択してください'); toast.classList.add('hidden'); sessionStorage.setItem('pwaToastDismissed', '1'); };
        } else {
          actionBtn.onclick = function () {
            if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.finally(function () { toast.classList.add('hidden'); sessionStorage.setItem('pwaToastDismissed', '1'); deferredPrompt = null; }); }
          };
        }
        closeBtn.onclick = function () { toast.classList.add('hidden'); sessionStorage.setItem('pwaToastDismissed', '1'); };
      });
  </script>
